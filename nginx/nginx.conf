worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            on_publish http://backend:8000/api/v1/live/hooks/on_publish;
            on_publish_done http://backend:8000/api/v1/live/hooks/on_publish_done;

            exec_push ffmpeg -i rtmp://localhost:1935/live/$name
                -c:v libx264 -preset veryfast -tune zerolatency
                -sc_threshold 0 -g 48 -keyint_min 48
                -vf "scale=640:360" -b:v 800k -maxrate 856k -bufsize 1200k
                -c:a aac -b:a 96k -ac 2
                -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+independent_segments
                -hls_segment_type fmp4
                /media/live/$name/360p/playlist.m3u8
                -c:v libx264 -preset veryfast -tune zerolatency
                -sc_threshold 0 -g 48 -keyint_min 48
                -vf "scale=1280:720" -b:v 2800k -maxrate 2996k -bufsize 4200k
                -c:a aac -b:a 128k -ac 2
                -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+independent_segments
                -hls_segment_type fmp4
                /media/live/$name/720p/playlist.m3u8
                -c:v libx264 -preset veryfast -tune zerolatency
                -sc_threshold 0 -g 48 -keyint_min 48
                -vf "scale=1920:1080" -b:v 5000k -maxrate 5350k -bufsize 7500k
                -c:a aac -b:a 192k -ac 2
                -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+independent_segments
                -hls_segment_type fmp4
                /media/live/$name/1080p/playlist.m3u8;
        }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Custom MIME types for HLS
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
        video/mp4 m4s mp4;
        text/vtt vtt;
    }

    server {
        listen 8080;

        # Serve live HLS segments
        location /live/ {
            alias /media/live/;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        }

        # Serve VOD media files (local storage mode — STORAGE_BACKEND=local)
        # When using cloud storage (s3/azure/gcs), files are served via
        # /api/v1/media/ proxy below or directly from CDN.
        location /media/ {
            alias /media/;
            add_header Cache-Control "public, max-age=31536000";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Range";
        }

        # Media proxy (cloud storage mode — streams from S3/Azure/GCS via backend)
        # Optimized: buffering off for streaming, long timeouts for large segments
        location /api/v1/media/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Reverse proxy to FastAPI backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            client_max_body_size 10G;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Frontend (Vite dev server proxy)
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
